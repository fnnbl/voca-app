name: SBOM and CVE Scan

on:
  pull_request:
    branches: ['**']
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  generate:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOMs (CycloneDX + SPDX)
        run: |
          syft . \
            --override-default-catalogers 'rust,javascript' \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 90

  scan:
    name: Scan SBOM for CVEs
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sboms

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SARIF report
        run: grype sbom:sbom.cyclonedx.json -o sarif --file grype-results.sarif

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif

      - name: Gate on high+ severity
        run: grype sbom:sbom.cyclonedx.json --fail-on high --only-fixed
