name: Release Build

on:
  push:
    branches:
      - develop
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Build Windows installer (unsigned)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (MSI + NSIS, unsigned)
        run: npm run tauri build -- --bundles msi,nsis

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voca-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
          if-no-files-found: error
