name: Release Build

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Build Windows installer (unsigned)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Clean stale bundle directory
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri app (NSIS, unsigned)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: voca-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
          if-no-files-found: error

      - name: Install Syft
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/syft-bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/syft-bin"
          echo "$RUNNER_TEMP/syft-bin" >> "$GITHUB_PATH"

      - name: Generate SBOMs (CycloneDX + SPDX)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          syft . \
            --override-default-catalogers 'rust,javascript' \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json

      - name: Compose latest.json updater manifest
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF#refs/tags/v}"
          INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
          SIG_FILE="${INSTALLER}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "ERROR: signature file not found at $SIG_FILE"
            echo "TAURI_SIGNING_PRIVATE_KEY secret may not be set, or the build did not sign."
            exit 1
          fi
          INSTALLER_NAME=$(basename "$INSTALLER")
          INSTALLER_URL="https://github.com/fnnbl/voca-app/releases/download/v${VERSION}/${INSTALLER_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the GitHub release for changes." \
            --arg pub_date "$PUB_DATE" \
            --rawfile signature "$SIG_FILE" \
            --arg url "$INSTALLER_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json
          echo "--- latest.json ---"
          cat latest.json

      - name: Publish draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            sbom.cyclonedx.json
            sbom.spdx.json
            latest.json
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
